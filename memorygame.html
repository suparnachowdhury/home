    <style>
        :root {
            --white:       #ffffff;
            --bg-page:     #F5F0EB; 
            --card-bg:     #FFFDF9;
            --accent:      #d62828;
            --accent2:     #c33149;
            --ink:         #111827;
            --ink-muted:   #6B7280;
            --border:      #E0D8D0;
            --nav-h:       68px;
             --accent-dark: #0d9e78;
            --accent-soft: #e4fdf5;
            --ink:         #111827;
            --ink-mid:     #374151;
            --ink-muted:   #6B7280;
            --ink-faint:   #9CA3AF;
            --border:      #e5e7eb;
            --border-mid:  #d1d5db;
            --code-bg:     #0f1117;
            --code-fg:     #e2e8f0;
            --radius-sm:   4px;
            --radius-md:   8px;
            --radius-lg:   14px;
            --shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md:   0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg:   0 8px 32px rgba(0,0,0,0.10);
            --font-serif:  'Lora', Georgia, serif;
            --font-sans:   'Inter', system-ui, sans-serif;
            --font-mono:   'JetBrains Mono', 'Courier New', monospace;
            --nav-h:       68px;
            --article-w:   740px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-page);
            color: var(--ink);
            font-size: 16px;
            line-height: 1.65;
            overflow-x: hidden;
        }
        /* ── NAV ── */
        nav {
            position: fixed;
            inset: 0 0 auto;
            z-index: 200;
            height: var(--nav-h);
            background: rgba(247,248,252,0.96);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }
        .nav-left {
            display: flex; align-items: center; gap: 0.85rem; text-decoration: none;
        }
        .nav-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--accent);
            display: block; flex-shrink: 0;
        }
        .nav-logo {
            font-family: var(--font-serif); font-size: 1.1rem;
            color: var(--ink); text-decoration: none; font-weight: 600; white-space: nowrap;
        }
        .nav-logo span { color: var(--accent-dark); }
        .nav-links { display: flex; align-items: center; gap: 0.15rem; list-style: none; }
        .nav-links a {
            color: var(--ink-muted); text-decoration: none; font-size: 0.78rem;
            font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
            padding: 0.42rem 0.8rem; border-radius: var(--radius-sm);
            transition: color 0.18s, background 0.18s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--ink); background: var(--border); }
        .nav-cta {
            background: var(--ink) !important; color: var(--white) !important;
            border-radius: var(--radius-sm) !important; margin-left: 0.5rem;
        }
        .nav-cta:hover { background: var(--accent-dark) !important; color: var(--white) !important; }
        .nav-hamburger {
            display: none; flex-direction: column; gap: 5px;
            background: none; border: none; cursor: pointer; padding: 4px;
        }
        .nav-hamburger span { display: block; width: 22px; height: 1.5px; background: var(--ink); }
        .mobile-nav {
            display: none; position: fixed; inset: var(--nav-h) 0 0;
            background: var(--white); z-index: 199; flex-direction: column;
            padding: 2rem 6%; border-top: 1px solid var(--border); overflow-y: auto;
        }
        .mobile-nav.open { display: flex; }
        .mobile-nav a {
            color: var(--ink-mid); text-decoration: none; font-size: 0.82rem;
            font-weight: 500; padding: 0.9rem 0; border-bottom: 1px solid var(--border);
            letter-spacing: 0.04em; text-transform: uppercase;
        }
        /* ── GAME CONTAINER ── */
        .game-wrapper { max-width: 700px; margin: 0 auto; padding: calc(var(--nav-h) + 3rem) 20px 4rem; text-align: center; }
        .game-header h1 { font-family: 'Georgia', serif; font-size: 2.2rem; color: var(--accent); letter-spacing: 2px; }
        .game-subtitle { font-family: 'Courier New', Courier, monospace; font-size: 0.9rem; color: var(--ink-muted); margin-bottom: 20px; }
        
        .timer { font-family: 'Courier New', Courier, monospace; font-size: 1.5rem; font-weight: bold; color: var(--accent2); margin-bottom: 15px; }
        
        .game-card { 
            background: var(--card-bg); border: 2px solid var(--border); border-radius: 8px; 
            padding: 30px; min-height: 400px; position: relative; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .word-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; max-width: 400px; margin: 0 auto; }
        .word-item { font-family: 'Courier New', Courier, monospace; font-size: 1.4rem; font-weight: bold; display: flex; gap: 10px; }
        .word-num { color: var(--ink-muted); min-width: 30px; text-align: right; }
        
        input[type="text"] {
            width: 100%; padding: 8px; font-family: 'Courier New', Courier, monospace; font-size: 1.2rem;
            border: 2px solid var(--border); border-radius: 4px; background: #faf6f6; outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        .affirmation-block { background: #f7e1d7; padding: 20px; margin: 15px 0; text-align: left; border-radius: 4px; }
        .block-title { font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; }
        .block-text { font-family: 'Georgia', serif; font-size: 1.3rem; }

        .hint { font-family: 'Georgia', serif; font-size: 0.95rem; margin-top: 15px; font-style: italic; }

        .button-row { display: flex; justify-content: space-between; margin-top: 25px; }
        .btn { 
            padding: 10px 25px; font-family: 'Georgia', serif; font-weight: bold; 
            border: none; border-radius: 4px; cursor: pointer; color: white; transition: opacity 0.2s;
        }
        .btn-quit { background: #c32f27; }
        .btn-action { background: #086788; }
        .btn-submit { background: var(--accent); }
        .btn:hover { opacity: 0.9; }

        .results { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: var(--accent2); font-size: 1.1rem; margin-top: 15px; line-height: 1.8; }

        /* ── FOOTER ── */
        footer { background: #111827; color: rgba(255,255,255,0.45); padding: 3rem 8%; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .footer-name { font-family: 'Lora', serif; color: white; font-weight: 600; }
        .footer-icons a { color: rgba(255,255,255,0.45); margin-left: 1rem; }

         <p class="hint" id="hintLabel">Memorise the words — click Next when ready</p>

<script>
    // ── CONSTANTS & STATE ──
const GOALS = ["You do not need to fix the whole year. Just fix the next hour."]; // Kept as constant as requested
let WORDS_POOL = [];
let AFFIRMATIONS = [];
let currentWords = [];
let timerInterval;
let timeLeft = 45;

const gameCard = document.getElementById('gameCard');
const timerLabel = document.getElementById('timer');
const hintLabel = document.getElementById('hintLabel');
const actionBtn = document.getElementById('actionBtn');
const resultsLabel = document.getElementById('resultsLabel');

// ── DATA FETCHING ──
async function loadAssets() {
    try {
        // Fetching words from assets folder
        const wordsResponse = await fetch('assets/words.txt');
        const wordsText = await wordsResponse.text();
        WORDS_POOL = wordsText.split('\n').map(w => w.trim()).filter(w => w.length > 0);

        // Fetching affirmations from assets folder
        const affResponse = await fetch('assets/affirmation.txt');
        const affText = await affResponse.text();
        AFFIRMATIONS = affText.split('\n').map(a => a.trim()).filter(a => a.length > 0);

        // Fallbacks if files are empty
        if (WORDS_POOL.length === 0) WORDS_POOL = ["apple", "bridge", "candle", "dream"];
        if (AFFIRMATIONS.length === 0) AFFIRMATIONS = ["Keep going — you are doing great."];

        initGame();
    } catch (error) {
        console.error("Error loading text files:", error);
        // Basic fallback so the game doesn't crash if fetch fails
        WORDS_POOL = ["error", "loading", "assets"];
        AFFIRMATIONS = ["Check console for fetch errors."];
        initGame();
    }
}

// ── GAME LOGIC ──
function initGame() {
    resultsLabel.innerText = "";
    // Randomly sample 10 words from the loaded pool
    currentWords = [...WORDS_POOL].sort(() => 0.5 - Math.random()).slice(0, 10);
    showMemorizeScreen();
}

function startTimer(seconds, callback) {
    clearInterval(timerInterval);
    timeLeft = seconds;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            callback();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    timerLabel.innerText = `◷ ${m}:${s < 10 ? '0' + s : s}`;
    timerLabel.style.color = timeLeft <= 10 ? "#d62828" : "#c33149";
}

function showMemorizeScreen() {
    hintLabel.innerText = "Memorise the words — click Next when ready";
    actionBtn.innerText = "Next →";
    actionBtn.className = "btn btn-action";
    actionBtn.onclick = showAffirmationScreen;

    let html = '<div class="word-grid">';
    currentWords.forEach((w, i) => {
        html += `<div class="word-item"><span class="word-num">${(i+1).toString().padStart(2, '0')}</span> ${w}</div>`;
    });
    html += '</div>';
    gameCard.innerHTML = html;
    startTimer(45, showAffirmationScreen);
}

function showAffirmationScreen() {
    clearInterval(timerInterval);
    hintLabel.innerText = "Breathe in · take a moment";
    actionBtn.style.display = "none";
    
    // Selecting from external affirmations and constant goals
    const goal = GOALS[Math.floor(Math.random() * GOALS.length)];
    const aff = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];

    gameCard.innerHTML = `
        <h2 style="font-family: Georgia; font-style: italic; color: var(--accent); margin-bottom: 20px;">This is your moment</h2>
        <div class="affirmation-block">
            <div class="block-title" style="color: #006d77;">MANTRA</div>
            <div class="block-text">${goal}</div>
        </div>
        <div class="affirmation-block">
            <div class="block-title" style="color: #6d597a;">AFFIRMATION</div>
            <div class="block-text">${aff}</div>
        </div>
    `;
    startTimer(20, showInputScreen);
}

function showInputScreen() {
    hintLabel.innerText = "Type as many words as you remember!";
    actionBtn.style.display = "block";
    actionBtn.innerText = "Submit ✓";
    actionBtn.className = "btn btn-submit";
    actionBtn.onclick = checkAnswers;

    let html = '<div class="word-grid">';
    for (let i = 0; i < 10; i++) {
        html += `<div class="word-item"><span class="word-num">${(i+1).toString().padStart(2, '0')}</span><input type="text" id="word${i}"></div>`;
    }
    html += '</div>';
    gameCard.innerHTML = html;
    document.getElementById('word0').focus();
    startTimer(45, checkAnswers);
}

function checkAnswers() {
    clearInterval(timerInterval);
    let recall = 0;
    let ordered = 0;
    const userWords = [];

    for (let i = 0; i < 10; i++) {
        const val = document.getElementById(`word${i}`).value.trim().toLowerCase();
        userWords.push(val);
        if (val === currentWords[i].toLowerCase()) ordered++;
        if (currentWords.some(w => w.toLowerCase() === val && val !== "")) recall++;
    }

    const row1 = currentWords.slice(0, 5).map((w, i) => `${i+1}.${w}`).join("  ");
    const row2 = currentWords.slice(5).map((w, i) => `${i+6}.${w}`).join("  ");

    resultsLabel.innerHTML = `RECALL: ${recall}/10 &nbsp;&nbsp; ORDER: ${ordered}/10<br>${row1}<br>${row2}`;
    
    actionBtn.innerText = "↺ Play Again";
    actionBtn.className = "btn btn-action";
    actionBtn.onclick = initGame;
}

// Start the loading process on page load
loadAssets();
</script>
