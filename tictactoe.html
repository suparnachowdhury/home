 /* ── NAV ── */

            inset: 0 0 auto;

            height: var(--nav-h);
            background: rgba(247,248,252,0.96);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;

        }

        }
        .nav-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--accent);
            display: block; flex-shrink: 0;
        }
        .nav-logo {
            font-family: var(--font-serif); font-size: 1.1rem;
            color: var(--ink); text-decoration: none; font-weight: 600; white-space: nowrap;
        }
        .nav-logo span { color: var(--accent-dark); }
        .nav-links { display: flex; align-items: center; gap: 0.15rem; list-style: none; }
        .nav-links a {
            color: var(--ink-muted); text-decoration: none; font-size: 0.78rem;
            font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
            padding: 0.42rem 0.8rem; border-radius: var(--radius-sm);
            transition: color 0.18s, background 0.18s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--ink); background: var(--border); }
        .nav-cta {
            background: var(--ink) !important; color: var(--white) !important;
            border-radius: var(--radius-sm) !important; margin-left: 0.5rem;
        }
        .nav-cta:hover { background: var(--accent-dark) !important; color: var(--white) !important; }
        .nav-hamburger {
            display: none; flex-direction: column; gap: 5px;
            background: none; border: none; cursor: pointer; padding: 4px;
        }
        .nav-hamburger span { display: block; width: 22px; height: 1.5px; background: var(--ink); }
        .mobile-nav {
            display: none; position: fixed; inset: var(--nav-h) 0 0;
            background: var(--white); z-index: 199; flex-direction: column;
            padding: 2rem 6%; border-top: 1px solid var(--border); overflow-y: auto;
        }
        .mobile-nav.open { display: flex; }
        .mobile-nav a {
            color: var(--ink-mid); text-decoration: none; font-size: 0.82rem;
            font-weight: 500; padding: 0.9rem 0; border-bottom: 1px solid var(--border);
            letter-spacing: 0.04em; text-transform: uppercase;
        }

/* ── LAYOUT ── */
.container{
  padding-top:110px;
  max-width:600px;
  margin:auto;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
  text-align:center;
}

/* ── GAME BOARD ── */
.board{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin:25px 0;
}

.cell{
  aspect-ratio:1;
  background:#f9fafb;
  border:1px solid var(--border);
  border-radius:10px;
  font-size:2rem;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.cell:hover{
  background:var(--accent-soft, #e4fdf5);
}

.cell.X{
  color:#0d9e78;
}

.cell.O{
  color:#d62828;
}

/* STATUS */

  font-weight:600;
  margin-top:10px;

/* BUTTON */
button{

footer { background: #111827; color: rgba(255,255,255,0.45); padding: 3rem 8%; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }

<!-- GAME -->
<div class="container">
<div class="card">

<h2>⭕ Tic Tac Toe ✖️</h2>


<div class="status" id="status">Player's turn</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">Restart Game</button>

</div>
</div>

<!-- ── FOOTER ── -->
<footer>
    <div>
        <div class="footer-name">Suparna Chowdhury</div>
        <div class="footer-sub">Data Scientist · ML Engineer · BI Analyst</div>
    </div>
    <div class="footer-icons">
        <a href="https://github.com/suparnachowdhury" target="_blank"><i class="fab fa-github"></i></a>
        <a href="https://linkedin.com/in/suparna-chowdhury" target="_blank"><i class="fab fa-linkedin-in"></i></a>

        <a href="https://x.com/DataSapient" target="_blank"><i class="fab fa-x-twitter"></i></a>

<script>
// GAME STATE
let board = ["","","","","","","","",""];
let player = "X";
let ai = "O";
let currentPlayer = "X";
let gameActive = true;

// WIN PATTERNS
const wins = [
 [0,1,2],[3,4,5],[6,7,8],
 [0,3,6],[1,4,7],[2,5,8],
 [0,4,8],[2,4,6]
];

const boardEl = document.getElementById("board");

// CREATE BOARD
function createBoard(){
  boardEl.innerHTML = "";
  board.forEach((cell, i)=>{
    const div = document.createElement("div");
    div.classList.add("cell");
    div.dataset.index = i;
    div.innerText = cell;

    if(cell) div.classList.add(cell);

    if(!cell && gameActive && currentPlayer === player){
      div.onclick = handlePlayerMove;
    }

    boardEl.appendChild(div);
  });
}

createBoard();

// PLAYER MOVE
function handlePlayerMove(e){
  const i = e.target.dataset.index;

  if(board[i] !== "" || !gameActive) return;

  board[i] = player;
  currentPlayer = ai;
  createBoard();

  if(checkGameOver(player)) return;

  // AI MOVE DELAY (feels natural)
  setTimeout(aiMove, 400);
}

// AI MOVE (MINIMAX)
function aiMove(){
  let bestMove = minimax(board, ai).index;
  board[bestMove] = ai;
  currentPlayer = player;

  createBoard();

  checkGameOver(ai);
}

// CHECK GAME OVER
function checkGameOver(current){
  if(checkWin(current)){
    document.getElementById("status").innerText =
      current === player ? "🎉 You win!" : "🤖 Computer wins!";
    gameActive = false;
    return true;
  }

  if(!board.includes("")){
    document.getElementById("status").innerText = "🤝 It's a draw!";
    gameActive = false;
    return true;
  }

  document.getElementById("status").innerText =
    currentPlayer === player ? "Your turn" : "Computer thinking...";
  
  return false;
}

// WIN CHECK
function checkWin(p){
  return wins.some(pattern => pattern.every(i => board[i] === p));
}

// MINIMAX AI
function minimax(newBoard, playerTurn){
  let availSpots = newBoard.map((v,i)=> v === "" ? i : null).filter(v=>v!==null);

  if(checkWin(player)) return {score:-10};
  if(checkWin(ai)) return {score:10};
  if(availSpots.length === 0) return {score:0};

  let moves = [];

  for(let i=0;i<availSpots.length;i++){
    let move = {};
    move.index = availSpots[i];

    newBoard[availSpots[i]] = playerTurn;

    if(playerTurn === ai){
      let result = minimax(newBoard, player);
      move.score = result.score;
    } else {
      let result = minimax(newBoard, ai);
      move.score = result.score;
    }

    newBoard[availSpots[i]] = "";
    moves.push(move);
  }

  let bestMove;

  if(playerTurn === ai){
    let bestScore = -Infinity;
    for(let i=0;i<moves.length;i++){
      if(moves[i].score > bestScore){
        bestScore = moves[i].score;
        bestMove = i;
      }
    }
  } else {
    let bestScore = Infinity;
    for(let i=0;i<moves.length;i++){
      if(moves[i].score < bestScore){
        bestScore = moves[i].score;
        bestMove = i;
      }
    }
  }

  return moves[bestMove];
}

// RESET
function resetGame(){
  board = ["","","","","","","","",""];
  currentPlayer = player;
  gameActive = true;
  document.getElementById("status").innerText = "Your turn";
  createBoard();
}
</script>
